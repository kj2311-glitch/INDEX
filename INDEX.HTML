    function loadCards(data) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgSrc = `https://drive.google.com/thumbnail?id=${item.id}&sz=w1000`;
            
            card.innerHTML = `
                <img src="${imgSrc}" alt="${item.c}" onerror="this.src='https://via.placeholder.com/320x450?text=फोटो+उपलब्ध+नाही'">
                <div class="info">
                    <div class="code">${item.c}</div>
                    <div class="details"><strong>रंग:</strong> ${item.r} | <strong>डिझाईन:</strong> ${item.d}</div>
                    <div class="feature-box">"${item.f}"</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function searchFn() {
        let val = document.getElementById('search').value.toUpperCase();
        let filtered = inventory.filter(x => x.c.includes(val));
        loadCards(filtered);
    }

    window.onload = () => loadCards(inventory);
</script>
